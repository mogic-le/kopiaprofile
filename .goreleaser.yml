# .goreleaser.yml — GoReleaser v2 config for kopiaprofile
#
# Run locally with `make snapshot` (or `goreleaser release --clean
# --snapshot --skip=publish,validate`). Full release is driven by
# `.github/workflows/release.yml` on tag push.

version: 2

project_name: kopiaprofile

before:
  hooks:
    - go mod download
    - go mod tidy

# Build the main binary.
builds:
  - id: kopiaprofile
    main: .
    binary: kopiaprofile
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
      - freebsd
      - openbsd
      - netbsd
    goarch:
      - "386"
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: freebsd
        goarch: arm64
      - goos: openbsd
        goarch: arm
      - goos: netbsd
        goarch: "386"
      - goos: windows
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}
      - -X main.builtBy=goreleaser

archives:
  - id: kopiaprofile-default
    ids:
      - kopiaprofile
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm" }}armv{{ .Arm }}
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - examples/*
      - docs/*

  - id: kopiaprofile-zip
    ids:
      - kopiaprofile
    formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm" }}armv{{ .Arm }}
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# Note: GoReleaser v2 removed the per-archive \`modtime\` knob. The
# default (\`{{ .CommitTimestamp }}\` at the top-level \`builds\`
# block) already gives us reproducible archive timestamps.

nfpms:
  - id: packages
    package_name: kopiaprofile
    ids:
      - kopiaprofile
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    homepage: https://github.com/mogic-le/kopiaprofile
    maintainer: DrDth <DrDth@users.noreply.github.com>
    description: |
      kopiaprofile is a configuration wrapper for kopia, inspired by
      resticprofile. Single config file, many profiles, inheritance,
      hooks, locks and secret-aware logging.
    license: GPL-3.0
    # We deliberately do not ship a manpage yet. The CLI has
    # structured --help output (cobra-built) and the README is the
    # authoritative reference; a hand-written manpage is on the
    # roadmap. Until then the .deb/.rpm/.apk install cleanly without
    # one, and `man kopiaprofile` simply returns "No manual entry"
    # (which is fine for an MVP).
    dependencies: []

# Checksums for the release artefacts.
checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

# We deliberately do NOT ship a cosign keyless signature with the
# release yet. Keyless signing on GitHub Actions requires:
#   - id-token: write permission in the workflow (we have it)
#   - a working OIDC token exchange from the runner to sigstore
#   - cosign CLI installed and reachable in $PATH during the
#     goreleaser-action step
# The previous attempt (#f72a8da) got the binary in place but the
# keyless flow intermittently failed at publish time without a
# recognisable error in the goreleaser log (the run output just
# stopped). Re-enable once we have a proper smoke test for the
# signing path. Until then, the SHA256SUMS file is the integrity
# guarantee — it is reproducible from a clean clone of the tag
# and works for apt / rpm / scoop / brew verifiers.
#
# signs:
#   - cmd: cosign
#     artifacts: checksum
#     signature: '${artifact}.sig'
#     output: true
#     # COSIGN_EXPERIMENTAL=1 was removed in cosign v3; keyless is
#     # the default now.

# We deliberately do NOT ship an SBOM. Generating one needs the
# cyclonedx-gomod binary installed in the goreleaser-action step
# (we did that) and reachable in $PATH when goreleaser shells out
# to it (which it does — the run output simply stopped at the
# SBOM stage on the latest run). An SBOM is a compliance nice-to-
# have that we can add back once the rest of the pipeline is
# stable; no install instructions in the README reference an
# SBOM today.
#
# sboms:
#   - id: source
#     artifacts: archive
#     cmd: cyclonedx-gomod

# CHANGELOG.md is hand-maintained (Keep-a-Changelog style).
# The release workflow (.github/workflows/release.yml) replaces the
# GoReleaser-generated notes with the body of the corresponding
# CHANGELOG.md section after `goreleaser release` runs. So we just
# turn GoReleaser's own changelog renderer off here.
changelog:
  disable: true

# Do NOT push a Docker image (kopiaprofile is a pure CLI; users install
# the binary directly, via the per-distro package, or via `go install`).

release:
  draft: true
  prerelease: auto
  header: |
    ## kopiaprofile {{ .Tag }}

    > A configuration wrapper for [Kopia](https://kopia.io), inspired by
    > [resticprofile](https://github.com/creativeprojects/resticprofile).
  footer: |
    ## Verifying the artefacts

    Each release ships a `kopiaprofile_VERSION_SHA256SUMS` file
    alongside the artefacts. Verify with:

    ```bash
    sha256sum -c kopiaprofile_VERSION_SHA256SUMS
    ```
  name_template: "{{.ProjectName}} v{{.Version}}"
  discussion_category_name: General
  make_latest: true
