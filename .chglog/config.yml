# config for git-chglog
# https://github.com/git-chglog/git-chglog
#
# `make changelog` / the `release` workflow run `git-chglog` with this
# config and pipe the output into `CHANGELOG.md` (the section between
# the `<!-- git-chglog HEADER-END -->` and `<!-- git-chglog LATEST-END -->`
# markers).

style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/mogic-le/kopiaprofile
  options:
    commits: true
    commit_groups: true
    commits_url: https://github.com/mogic-le/kopiaprofile/commit
    commit_url: https://github.com/mogic-le/kopiaprofile/commit/{{.Hash}}
    group: "### {{.Name}}"
    header_pattern: "^## \\[?(?P<v\\d+(\\.\\d+){0,2})[\\)]? - (?P<date>.*)$"
    header_pattern_maps:
      - { "v": "Version" }
    squash_pattern: "^.*$"
    no-cherry-pick: true
    append: true
    filter: "^((?!revert|docs|test|ci|build|chore).)*$"
  authors:
    - name: DrDth
      email: DrDth@users.noreply.github.com
  bot_pattern: "^(dependabot|renovate)\\[bot\\]@users\\.noreply\\.github\\.com$"

options:
  commit_filters:
    - "(?i)^.*\\bci(\\([a-z]+\\))?(\\([a-z]+\\))?\\b.*$"
    - "(?i)^.*\\bdocs(\\([a-z]+\\))?(\\([a-z]+\\))?\\b.*$"
    - "(?i)^.*\\bstyle(\\([a-z]+\\))?(\\([a-z]+\\))?\\b.*$"
    - "(?i)^.*\\btest(\\([a-z]+\\))?(\\([a-z]+\\))?\\b.*$"
  commit_group_convention_map:
    "feat":   "Features"
    "fix":    "Bug Fixes"
    "perf":   "Performance Improvements"
    "refactor": "Refactoring"
    "revert": "Reverts"
    "build":  "Build System"
    "docs":   "Documentation"
  commit_group_order: ["Features", "Bug Fixes", "Performance Improvements", "Refactoring", "Reverts", "Build System", "Documentation"]
  commits_sort_by: "Scope"
  template_overrides:
    ##: "{{.ConventionalCommit.Type | title}}"
  group: "### {{.Name}}"

template_overrides:
  - "## {{.Version}} ({{.Date}})"
