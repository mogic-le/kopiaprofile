## Is your feature request related to a problem?

A clear and concise description of what the problem is. Ex. I'm
always frustrated when […]

## Describe the solution you'd like

A clear and concise description of what you want to happen. If you
have a kopia / resticprofile command in mind, mention it.

## Describe alternatives you've considered

Any alternative solutions or features you've considered.

## Additional context

Add any other context, screenshots, or examples about the feature
request here. Mention if the feature exists in resticprofile (so we
can keep parity) and link to its documentation.
