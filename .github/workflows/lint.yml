name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          # v2.x supports Go 1.23+. The latest v1.x was built with
          # Go 1.23 and refuses to lint projects targeting a higher
          # Go version in go.mod (we're on 1.25). Track the latest
          # v2.x release.
          version: v2.12.2
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
