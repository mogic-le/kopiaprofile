name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must exist on the default branch)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  # ----------------------------------------------------------------
  # Build and publish artefacts via GoReleaser.
  #
  # CHANGELOG.md is maintained by hand (Keep-a-Changelog style) and
  # committed to main like any other file; we don't run git-chglog
  # in the release workflow. The GitHub release notes are sourced
  # from CHANGELOG.md directly (see "Set release notes from
  # CHANGELOG.md" below).
  # ----------------------------------------------------------------
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      # Install the GitHub CLI. ubuntu-latest runners do not ship
      # `gh` and the cli/cli source repo is not a GitHub Action
      # (no action.yml), so we cannot use `uses: cli/cli@…`.
      # Download the prebuilt .deb from the latest release and
      # install it with dpkg. The GH_TOKEN + GITHUB_TOKEN below is
      # automatically picked up by `gh` for the subsequent
      # `gh release edit` call.
      - name: Install GitHub CLI
        env:
          GH_VERSION: "2.93.0"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gh.deb \
            "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/gh.deb
          rm -f /tmp/gh.deb
          gh --version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Replace the auto-generated release notes (which GoReleaser
      # would otherwise fill from `git log` per `.goreleaser.yml`'s
      # `changelog:` block) with the hand-written body of
      # CHANGELOG.md. We extract the first `## [...]` section after
      # the heading "Changelog" — that's the entry for this release.
      # If the extraction fails for any reason, we leave the existing
      # notes untouched instead of failing the whole release.
      - name: Set release notes from CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Pull the body of the first `## [<version>]` section from
          # CHANGELOG.md, plus a header line. We don't try to be
          # clever about Keep-a-Changelog's "Unreleased" section —
          # the maintainer should have moved it into the new
          # version block before tagging.
          BODY=$(awk -v ver="$VERSION" '
            BEGIN { found = 0; in_section = 0 }
            /^## \[/ {
              if (in_section) { exit }
              if (index($0, "[" ver "]") > 0) {
                found = 1
                in_section = 1
                print
                next
              }
            }
            in_section { print }
            END { exit !found }
          ' CHANGELOG.md) || {
            echo "::warning::No CHANGELOG.md entry for ${VERSION}; keeping GoReleaser-generated notes."
            exit 0
          }
          # Re-add a one-line header with the version + a closing
          # line that points to the README for installation steps.
          NOTES=$(printf '## kopiaprofile %s\n\n%s\n\n---\nSee [README.md](https://github.com/mogic-le/kopiaprofile#installation) for installation instructions.\n' \
            "$VERSION" "$BODY")
          printf '%s\n' "$NOTES" > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md

      - name: Notify Discord (optional)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "kopiaprofile release failed"
          description: "The release workflow for ${{ github.ref_name }} failed. See the run for details."
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        continue-on-error: true
