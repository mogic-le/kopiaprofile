name: Integration Test (rustfs)

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "testdata/integration-test.sh"
      - "testdata/docker-compose.rustfs.yaml"
      - ".github/workflows/integration.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Integration on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      # Linux uses Docker; macOS uses Colima / orbstack / Docker Desktop.
      - name: Set up Docker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo systemctl start docker || true

      - name: Start rustfs
        run: docker compose -f testdata/docker-compose.rustfs.yaml up -d
        env:
          RUSTFS_ACCESS_KEY: rustfsadmin
          RUSTFS_SECRET_KEY: rustfsadmin-secret

      - name: Wait for rustfs healthcheck
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/health >/dev/null 2>&1; then
              echo "rustfs up"
              break
            fi
            echo "waiting for rustfs ($i)..."
            sleep 2
          done

      - name: Install kopia
        run: |
          if command -v kopia >/dev/null 2>&1; then
            echo "kopia already installed: $(kopia --version)"
          else
            curl -fsSL https://github.com/kopia/kopia/releases/download/v0.23.0/kopia-0.23.0-$(uname -s)-$(uname -m).zip -o /tmp/kopia.zip
            unzip /tmp/kopia.zip -d /tmp/kopia
            sudo mv /tmp/kopia/kopia /usr/local/bin/
            kopia --version
          fi

      - name: Build kopiaprofile
        run: make build

      - name: Run integration test
        run: bash testdata/integration-test.sh
        env:
          KOPIA_TEST_PASSWORD: integrationtest
          KOPIA_TEST_BUCKET: kopiaprofile-test
          KOPIA_TEST_ENDPOINT: localhost:9000
          KOPIA_TEST_AK: rustfsadmin
          KOPIA_TEST_SK: rustfsadmin-secret
          KOPIA_BIN: kopia
          KOPIAPROFILE_BIN: ./kopiaprofile
