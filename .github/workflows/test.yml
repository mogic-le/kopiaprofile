name: Tests

on:
  push:
    branches: [main, master]
    tags-ignore: ["v*"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }} (Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Build
        run: make build

      - name: Smoke test (--help)
        run: ./kopiaprofile --help

      - name: Smoke test (version)
        run: ./kopiaprofile version

      - name: Smoke test (skeleton config)
        shell: bash
        run: |
          set -euo pipefail
          ./kopiaprofile init /tmp/smoke.yaml --force --format=yaml
          test -s /tmp/smoke.yaml
          ./kopiaprofile display --config /tmp/smoke.yaml 2>&1 | head -20
          # The skeleton has no profiles, so display should show the
          # "no profiles" message and exit 0.
          test $? -eq 0

      - name: Unit tests
        run: make test-ci
        env:
          GOEXPERIMENT: ""

      - name: E2E smoke (filesystem backend)
        # Exercises the full argv assembly path against a real
        # `kopia` binary, with a *local* filesystem backend (no S3,
        # no Docker, no external services). This catches regressions
        # in BuildSnapshotArgs / BuildCopyArgs / hook env wiring
        # without paying the cost of a real backup or needing any
        # network access.
        #
        # This is NOT a full integration test. The full
        # `bash testdata/integration-test.sh` (which spins up a
        # rustfs container and exercises S3 + multi-repo-copy) is
        # meant to be run locally with `make integration`. See
        # docs/development.md for why.
        #
        # Skipped on Windows: the install step uses `sudo` and
        # `/usr/local/bin`, neither of which exist on a stock
        # windows-latest runner. The skeleton-config smoke test
        # above already covers the cross-platform code paths; the
        # full E2E just adds kopia's argv round-trip on top, which
        # is fully covered by the linux+macos jobs in the matrix.
        if: runner.os != 'Windows'
        shell: bash
        env:
          KOPIA_PASSWORD: sm0ke-test-pw
          KOPIA_CONFIG_PATH: /tmp/kp-smoke-config
        run: |
          set -euo pipefail
          # Install kopia 0.23 (the version we test against).
          # kopia's release-asset naming convention is unusual:
          #   Linux:   kopia-VERSION-linux-{x64,arm,arm64}.tar.gz
          #   macOS:   kopia-VERSION-macOS-{x64,arm64,universal}.{tar.gz,dmg}
          #   Windows: kopia-VERSION-windows-x64.zip
          # We only fetch the headless (tar.gz / zip) variants
          # because the workflow is non-interactive.
          UNAME_S="$(uname -s)"
          UNAME_M="$(uname -m)"
          case "$UNAME_S" in
            Linux)
              KOPIA_OS=linux
              case "$UNAME_M" in
                x86_64)  KOPIA_ARCH=x64   ;;
                aarch64) KOPIA_ARCH=arm64 ;;
                armv7l|armv6l) KOPIA_ARCH=arm ;;
                *) echo "unsupported Linux arch: $UNAME_M"; exit 1 ;;
              esac
              KOPIA_EXT=tar.gz
              ;;
            Darwin)
              KOPIA_OS=macOS
              case "$UNAME_M" in
                x86_64)  KOPIA_ARCH=x64   ;;
                arm64)   KOPIA_ARCH=arm64 ;;
                *) echo "unsupported macOS arch: $UNAME_M"; exit 1 ;;
              esac
              KOPIA_EXT=tar.gz
              ;;
            *)
              echo "unsupported OS: $UNAME_S"; exit 1
              ;;
          esac
          if ! command -v kopia >/dev/null 2>&1; then
            ASSET="kopia-0.23.0-${KOPIA_OS}-${KOPIA_ARCH}.${KOPIA_EXT}"
            echo "Downloading $ASSET"
            curl -fsSL \
              "https://github.com/kopia/kopia/releases/download/v0.23.0/${ASSET}" \
              -o /tmp/kopia.${KOPIA_EXT}
            rm -rf /tmp/kopia-bin
            mkdir -p /tmp/kopia-bin
            case "$KOPIA_EXT" in
              tar.gz)
                tar -xzf /tmp/kopia.tar.gz -C /tmp/kopia-bin --strip-components=1
                ;;
              zip)
                unzip -o /tmp/kopia.zip -d /tmp/kopia-bin
                ;;
            esac
            if [ -f /tmp/kopia-bin/kopia ]; then
              INSTALL_BIN=/tmp/kopia-bin/kopia
            else
              echo "kopia binary not found in archive"; ls -R /tmp/kopia-bin; exit 1
            fi
            sudo mv "$INSTALL_BIN" /usr/local/bin/kopia || mv "$INSTALL_BIN" /usr/local/bin/kopia
            kopia --version
          fi

          # Generate a skeleton config and pin a few values.
          ./kopiaprofile init /tmp/kp-smoke.yaml --force --format=yaml
          cat > /tmp/kp-smoke.yaml <<'EOF'
          default-base: &base
            kopia-binary: kopia
          profiles:
            smoke:
              <<: *base
              repository:
                type: filesystem
                path: /tmp/kp-smoke-repo
              cache-dir: /tmp/kp-smoke-cache
              backup:
                sources: ["/tmp/kp-smoke-data"]
              password:
                source: env
                env: KOPIA_PASSWORD
          EOF
          mkdir -p /tmp/kp-smoke-data
          echo "smoke test $(date -u +%FT%TZ)" > /tmp/kp-smoke-data/file.txt

          # init + snapshot + snapshots
          ./kopiaprofile --config /tmp/kp-smoke.yaml smoke init
          ./kopiaprofile --config /tmp/kp-smoke.yaml smoke snapshot create
          ./kopiaprofile --config /tmp/kp-smoke.yaml smoke snapshots

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
